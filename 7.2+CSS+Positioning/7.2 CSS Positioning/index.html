<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    .red-circle{
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background-color: rgb(255, 255, 255);
      position: absolute;
      top: 50px;
      left: 150px;
    }

    .blue-box{
      background-color: rgb(255, 28, 66);
      width: 500px;
      height: 300px;
      position: relative;
      top: 100px;
      left: 100px;
    }
    /* Write your code here */
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
